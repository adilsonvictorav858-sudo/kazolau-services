<script>
  async function renderFavoritosPagina() {
    const grid = document.getElementById("favoritos-grid");
    const contagem = document.getElementById("fav-contagem");
    const ids = Favoritos.obter();
    if (!ids.length) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="emoji">♥</div><p>Ainda não guardaste nenhum favorito.<br>Clica no ♥ de um produto para o guardares aqui.</p><a href="loja.html" class="btn btn-navy" style="margin-top:14px">Ir à loja</a></div>`;
      contagem.textContent = "";
      return;
    }
    const produtos = await carregarTodosProdutos();
    const favoritos = produtos.filter(p => ids.includes(p.id));
    contagem.textContent = `${favoritos.length} produto${favoritos.length === 1 ? "" : "s"}`;
    grid.innerHTML = favoritos.length
      ? favoritos.map(cardProduto).join("")
      : `<div class="empty-state" style="grid-column:1/-1"><div class="emoji">♥</div><p>Os produtos que guardaste já não estão disponíveis.</p></div>`;
    Favoritos.marcarAtivos();
  }

  document.addEventListener("DOMContentLoaded", renderFavoritosPagina);
  // Atualiza a lista em tempo real se remover um favorito nesta própria página
  document.addEventListener("click", (ev) => {
    if (ev.target.closest(".card-fav")) setTimeout(renderFavoritosPagina, 50);
  });
</script>

<!DOCTYPE html>
<html lang="pt-AO">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Administrativo — Kazolau Services</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<style>
  body { background: var(--bg-light); }
  .admin-header { background: var(--navy-900); color: var(--white); padding: 18px 0; }
  .admin-header .container { display: flex; align-items: center; justify-content: space-between; }
  .pedido-row { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 18px 20px; margin-bottom: 14px; display: flex; gap: 16px; align-items: flex-start; flex-wrap: wrap; }
  .pedido-row .info { flex: 1; min-width: 240px; }
  .pedido-row select { border: 1.5px solid var(--border); border-radius: 8px; padding: 9px 12px; font-size: 13.5px; font-weight: 600; }
  .stat-pill { display: inline-flex; gap: 6px; align-items: center; background: var(--bg-alt); border-radius: 999px; padding: 6px 14px; font-size: 13px; font-weight: 600; margin-right: 8px; margin-bottom: 8px; }
</style>
</head>
<body>

<div class="admin-header">
  <div class="container">
    <div class="logo"><span class="mark">K</span><span>KAZOLAU<small>ADMIN</small></span></div>
    <div id="admin-user-box" style="display:none;align-items:center;gap:12px">
      <span id="admin-user-name" style="font-size:14px;color:rgba(255,255,255,.8)"></span>
      <button class="btn btn-outline-light btn-sm" onclick="logoutGoogle()">Sair</button>
    </div>
  </div>
</div>

<section class="section" style="padding-top:36px">
  <div class="container">

    <div id="admin-login-box">
      <div class="empty-state" style="background:var(--white);border:1px solid var(--border);border-radius:var(--radius-md);padding:50px 20px">
        <div class="emoji">🔐</div>
        <p>Área restrita. Inicia sessão com a conta de administrador.</p>
        <button class="btn btn-gold" style="margin-top:16px" onclick="loginGoogle()">Entrar com Google →</button>
      </div>
    </div>

    <div id="admin-negado-box" style="display:none">
      <div class="empty-state" style="background:var(--white);border:1px solid var(--border);border-radius:var(--radius-md);padding:50px 20px">
        <div class="emoji">🚫</div>
        <p>Esta conta não tem acesso ao painel administrativo.</p>
        <button class="btn btn-outline-navy" style="margin-top:16px" onclick="logoutGoogle()">Sair e tentar com outra conta</button>
      </div>
    </div>

    <div id="admin-painel" style="display:none">
      <div class="section-head"><h2>Pedidos</h2><span class="eyebrow" id="admin-contagem"></span></div>
      <div id="admin-filtros" style="margin-bottom:20px"></div>
      <div id="admin-pedidos-lista"></div>
    </div>

  </div>
</section>

<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
<script src="../js/firebase-config.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/pedidos.js"></script>
<script src="../js/app.js"></script>
<script src="admin.js"></script>
</body>
</html>

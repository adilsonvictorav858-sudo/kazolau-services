<div class="overlay" id="cart-overlay"></div>

<div class="modal" id="modal-negociar">
  <div class="modal-card">
    <div class="modal-head"><h3>🤝 Faça a sua oferta</h3><button data-close-modal>✕</button></div>
    <div class="modal-body">
      <div class="field"><label>Produto</label><div id="neg-produto-nome" style="font-weight:700"></div><div class="ref-price" id="neg-produto-preco"></div></div>
      <form id="neg-form">
        <div class="field"><label>O seu nome</label><input type="text" id="neg-nome" placeholder="Nome completo" required></div>
        <div class="field"><label>WhatsApp</label><input type="text" id="neg-whatsapp" placeholder="9XX XXX XXX" required></div>
        <div class="field"><label>Quanto quer pagar? (Kz)</label><input type="number" id="neg-oferta" placeholder="Ex: 100000" required></div>
        <button type="submit" class="btn btn-gold btn-block">Enviar oferta no WhatsApp →</button>
      </form>
    </div>
  </div>
</div>
